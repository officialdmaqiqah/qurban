<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Qurban Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/forgot_password-CfX8-DTa.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabase-CQA5XZYd.js">
  <link rel="stylesheet" crossorigin href="/assets/supabase-DOA7jKZJ.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card" style="text-align: center; max-width: 420px;">

            <!-- STEP 1: Verifikasi Identitas -->
            <div id="stepVerify">
                <div class="login-header">
                    <h2>🔑 Lupa Password?</h2>
                    <p style="font-size:0.9rem;">Masukkan <strong>Username</strong> dan <strong>Nomor WA</strong> yang terdaftar untuk memverifikasi identitas Anda.</p>
                </div>
                <form id="fwForm" class="login-form">
                    <div class="input-group" style="text-align: left;">
                        <label for="inpUsername">Username / Email Akun</label>
                        <input type="text" id="inpUsername" placeholder="Contoh: fajar atau fajar@qurban.com" required autocomplete="off">
                    </div>
                    <div class="input-group" style="text-align: left; margin-top: 1rem;">
                        <label for="inpWaVerify">Nomor WhatsApp Terdaftar</label>
                        <input type="text" id="inpWaVerify" placeholder="Contoh: 628123456789" required autocomplete="off">
                    </div>
                    <div id="errMsg" style="display:none; background:rgba(239,68,68,0.1); color:var(--danger); padding:0.75rem; border-radius:8px; font-size:0.85rem; margin-top:0.75rem; text-align:left;"></div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top:1.25rem;">
                        ✅ Verifikasi Identitas
                    </button>
                </form>
                <div class="login-footer" style="margin-top: 1.5rem; font-size: 0.875rem;">
                    <a href="index.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">← Kembali ke Login Utama</a>
                </div>
            </div>

            <!-- STEP 2: Atur Password Baru -->
            <div id="stepReset" style="display:none;">
                <div class="login-header">
                    <div style="font-size:3rem; margin-bottom:0.5rem;">🔓</div>
                    <h2>Identitas Terverifikasi</h2>
                    <p id="resetGreeting" style="font-size:0.9rem; color:var(--success);"></p>
                </div>
                <form id="fwResetForm" class="login-form">
                    <div class="input-group" style="text-align: left;">
                        <label for="inpNewPwd">Password Baru</label>
                        <input type="password" id="inpNewPwd" placeholder="Minimal 6 karakter" required>
                    </div>
                    <div class="input-group" style="text-align: left; margin-top: 1rem;">
                        <label for="inpConfirmPwd">Konfirmasi Password Baru</label>
                        <input type="password" id="inpConfirmPwd" placeholder="Ketik ulang password baru" required>
                    </div>
                    <div id="errMsgReset" style="display:none; background:rgba(239,68,68,0.1); color:var(--danger); padding:0.75rem; border-radius:8px; font-size:0.85rem; margin-top:0.75rem; text-align:left;"></div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top:1.25rem;">
                        💾 Simpan Password Baru
                    </button>
                </form>
            </div>

            <!-- STEP 3: Sukses -->
            <div id="stepDone" style="display:none;">
                <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
                <h2 style="margin-bottom:0.5rem;">Password Berhasil Diubah!</h2>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">Silakan login kembali menggunakan password baru Anda.</p>
                <a href="index.html" class="btn btn-primary btn-block" style="text-decoration:none; display:block;">
                    🚀 Ke Halaman Login
                </a>
            </div>

        </div>
    </div>


</body>
</html>
