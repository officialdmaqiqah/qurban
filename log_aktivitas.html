<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Aktivitas | DMQ System</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .log-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: 0.2s;
        }
        .log-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }
        .log-user-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .log-info {
            flex: 1;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.25rem;
        }
        .log-user-name {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .log-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .log-action-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .log-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-open { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge-save { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .badge-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="sidebarHeaderWrapper"></div>
        <nav class="sidebar-nav"></nav>
    </div>

    <div class="main-content">
        <header class="topbar">
            <div class="page-title">
                <h1>📜 Log Aktivitas User</h1>
                <p>Memantau aktivitas real-time seluruh personil DMQ</p>
            </div>
            <div class="user-menu">
                <span id="userEmailDisplay"></span>
            </div>
        </header>

        <main class="content-area">
            <div class="filter-bar">
                <div class="search-box">
                    <input type="text" id="inpSearchLog" class="form-control" placeholder="Cari nama user, aksi, atau halaman...">
                </div>
                <select id="filterAction" class="form-control" style="width: 200px;">
                    <option value="">Semua Aksi</option>
                    <option value="OPEN_PAGE">Membuka Halaman</option>
                    <option value="SAVE_DATA">Simpan Data</option>
                    <option value="DELETE">Hapus Data</option>
                    <option value="LOGIN">Login</option>
                </select>
                <button class="btn btn-primary" id="btnRefreshLog">🔄 Refresh</button>
            </div>

            <div id="logContainer">
                <!-- Data will be loaded here -->
                <div class="empty-state">
                    <div class="empty-icon">⏳</div>
                    <p>Memuat data aktivitas...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- v7.9 [THE TOTAL VICTORY] - EMERGENCY BYPASS -->
    <script type="module">
        import { supabase } from './src/supabase.js';
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return;

                const userId = session.user.id;
                const isYahya = ['15a3372c-87ae-4f0b-8d3b-fc11ccc2b0e1', '7cba5bb4-6a49-4cf9-8006-1a3e88c51ece'].includes(userId);
                
                if (isYahya) {
                    const nav = document.querySelector('.sidebar-nav');
                    if (nav) {
                        nav.innerHTML = `
                            <a href="dashboard.html" class="nav-item"> Dashboard Keuangan</a>
                            <div class="nav-header">📁 DATA STOCK</div>
                            <a href="kambing.html" class="nav-item">&bull; Master Data</a>
                            <a href="kambing_masuk.html" class="nav-item">&bull; Kambing Masuk</a>
                            <a href="kambing_terjual.html" class="nav-item">&bull; Kambing Terjual</a>
                            <a href="kesehatan.html" class="nav-item">🏥 Kambing Sakit/Mati</a>
                            <a href="stok_opname.html" class="nav-item">&bull; Stok Opname</a>
                            <a href="distribusi.html" class="nav-item">&bull; Distribusi</a>
                            <a href="pemetaan_kandang.html" class="nav-item">&bull; Pemetaan Kandang</a>
                            <div class="nav-header">💰 DATA FINANCE</div>
                            <a href="keuangan.html" class="nav-item">&bull; Pencatatan Keuangan</a>
                            <a href="deposit_agen.html" class="nav-item">&bull; Titipan Dana Agen</a>
                            <a href="terima_pelunasan.html" class="nav-item">&bull; Pelunasan Order</a>
                            <a href="hutang_supplier.html" class="nav-item">&bull; Pelunasan Supplier</a>
                            <a href="komisi.html" class="nav-item">&bull; Komisi Agen</a>
                            <a href="laporan.html" class="nav-item" style="color:#a855f7 !important; font-weight:600; background:rgba(168,85,247,0.1); border:1px solid #a855f7; margin-top:5px;">📊 LAPORAN</a>
                            <a href="log_aktivitas.html" class="nav-item" style="color:#10b981 !important; margin-top:10px; font-weight:600; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">🛡️ BUKA LOG AKTIVITAS (v7.9)</a>
                        `;
                        nav.querySelectorAll('.nav-item').forEach(item => {
                            item.style.setProperty('display', 'flex', 'important');
                            if (window.location.pathname.includes(item.getAttribute('href'))) item.classList.add('active');
                        });
                    }
                }
            } catch (e) { console.error("EMBEDDED ERROR:", e); }
        });
    </script>
    <script type="module" src="src/layout_v53.js?v=7.9"></script>
    <script type="module" src="src/log_aktivitas.js?v=7.9"></script>
</body>
</html>
