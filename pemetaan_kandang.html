<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemetaan Kandang - Qurban Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <script>(function(){const t=localStorage.getItem('QURBAN_THEME')||'light';if(t==='light')document.documentElement.classList.add('light-mode');})();</script>
    <style>
        :root {
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            --card-hover: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }

        .pen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .pen-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: var(--card-shadow);
        }

        .pen-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-hover);
            border-color: var(--primary-transparent);
        }

        .pen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pen-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .pen-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-low { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .status-optimal { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-overload { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .pen-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        .progress-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-bar {
            height: 100%;
            border-radius: 100px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-low { background: #3b82f6; }
        .bar-optimal { background: #10b981; }
        .bar-warning { background: #f59e0b; }
        .bar-overload { background: #ef4444; }

        .capacity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .capacity-input {
            width: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-radius: 6px;
            padding: 2px 6px;
            text-align: center;
            font-weight: 600;
        }

        .empty-pen {
            opacity: 0.5;
            filter: grayscale(1);
        }

        /* Stats overview cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .summary-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .summary-info h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 0;
        }

        .summary-info .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
        }

        @media (max-width: 768px) {
            .pen-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span style="font-weight: 600;">Daarul Mahabbah Qurban</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Populated by layout.js -->
            </nav>
            <div style="padding: 1.5rem;">
                <button id="logoutBtn" class="btn btn-sm" style="width: 100%; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted);">
                    Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="page-title">Pemetaan & Kapasitas Kandang</div>
                <div class="user-menu">
                    <span id="userEmailDisplay" style="color: var(--text-muted); font-size: 0.875rem;">admin@qurban.com</span>
                </div>
            </header>

            <div class="content-area">
                <!-- Summary Stats -->
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-icon" style="background: rgba(168, 85, 247, 0.1); color: #a855f7;">🏠</div>
                        <div class="summary-info">
                            <h4>Total Kandang</h4>
                            <div class="value" id="totalPens">0</div>
                        </div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">🐏</div>
                        <div class="summary-info">
                            <h4>Total Isi</h4>
                            <div class="value" id="totalLivestock">0</div>
                        </div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">⚠️</div>
                        <div class="summary-info">
                            <h4>Kandang Overload</h4>
                            <div class="value" id="overloadCount">0</div>
                        </div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">📊</div>
                        <div class="summary-info">
                            <h4>Rata-rata Kepadatan</h4>
                            <div class="value" id="avgDensity">0%</div>
                        </div>
                    </div>
                </div>

                <div class="flex-between" style="margin-bottom: 1.5rem;">
                    <div>
                        <h3 style="margin:0;">Pemetaan Visual</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted);">Monitor kapasitas ternak di setiap lokasi kandang.</p>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                         <button class="btn btn-primary" id="btnRefresh" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text-main);">🔄 Segarkan</button>
                    </div>
                </div>

                <div class="pen-grid" id="penGrid">
                    <!-- Pens will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="src/layout.js?v=4.1"></script>
    <script type="module" src="src/pemetaan_kandang.js"></script>
</body>
</html>
