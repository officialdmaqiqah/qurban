<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Qurban Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card" style="text-align: center; max-width: 420px;">

            <!-- STEP 1: Verifikasi Identitas -->
            <div id="stepVerify">
                <div class="login-header">
                    <div class="logo" style="text-align: center;">
                        <img id="forgotLogo" src="src/assets/logo_dm_qurban.png" alt="Daarul Mahabbah Logo" style="width: 100px; height: 100px; margin: 0 auto 1.5rem; display: block; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-card); box-shadow: 0 16px 40px rgba(0,0,0,0.1), 0 6px 15px rgba(0,0,0,0.05); background: #111; opacity: 0; transition: opacity 0.3s ease;">
                    </div>
                    <h2>🔑 Lupa Password?</h2>
                    <p style="font-size:0.9rem;">Masukkan <strong>Username</strong> dan <strong>Nomor WA</strong> yang terdaftar untuk memverifikasi identitas Anda.</p>
                </div>
                <form id="fwForm" class="login-form">
                    <div class="input-group" style="text-align: left;">
                        <label for="inpUsername">Username / Email Akun</label>
                        <input type="text" id="inpUsername" placeholder="Contoh: fajar atau fajar@qurban.com" required autocomplete="off">
                    </div>
                    <div class="input-group" style="text-align: left; margin-top: 1rem;">
                        <label for="inpWaVerify">Nomor WhatsApp Terdaftar</label>
                        <input type="text" id="inpWaVerify" placeholder="Contoh: 628123456789" required autocomplete="off">
                    </div>
                    <div id="errMsg" style="display:none; background:rgba(239,68,68,0.1); color:var(--danger); padding:0.75rem; border-radius:8px; font-size:0.85rem; margin-top:0.75rem; text-align:left;"></div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top:1.25rem;">
                        ✅ Verifikasi Identitas
                    </button>
                </form>
                <div class="login-footer" style="margin-top: 1.5rem; font-size: 0.875rem;">
                    <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">← Kembali ke Login Utama</a>
                </div>
            </div>

            <!-- STEP 2: Atur Password Baru -->
            <div id="stepReset" style="display:none;">
                <div class="login-header">
                    <div style="font-size:3rem; margin-bottom:0.5rem;">🔓</div>
                    <h2>Identitas Terverifikasi</h2>
                    <p id="resetGreeting" style="font-size:0.9rem; color:var(--success);"></p>
                </div>
                <form id="fwResetForm" class="login-form">
                    <div class="input-group" style="text-align: left;">
                        <label for="inpNewPwd">Password Baru</label>
                        <input type="password" id="inpNewPwd" placeholder="Minimal 6 karakter" required>
                    </div>
                    <div class="input-group" style="text-align: left; margin-top: 1rem;">
                        <label for="inpConfirmPwd">Konfirmasi Password Baru</label>
                        <input type="password" id="inpConfirmPwd" placeholder="Ketik ulang password baru" required>
                    </div>
                    <div id="errMsgReset" style="display:none; background:rgba(239,68,68,0.1); color:var(--danger); padding:0.75rem; border-radius:8px; font-size:0.85rem; margin-top:0.75rem; text-align:left;"></div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top:1.25rem;">
                        💾 Simpan Password Baru
                    </button>
                </form>
            </div>

            <!-- STEP 3: Sukses -->
            <div id="stepDone" style="display:none;">
                <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
                <h2 style="margin-bottom:0.5rem;">Password Berhasil Diubah!</h2>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">Silakan login kembali menggunakan password baru Anda.</p>
                <a href="login.html" class="btn btn-primary btn-block" style="text-decoration:none; display:block;">
                    🚀 Ke Halaman Login
                </a>
            </div>

        </div>
    </div>

    <script type="module">
        import { supabase } from './src/supabase.js';

        // Load Branding Dynamic
        async function loadBranding() {
            try {
                const { data } = await supabase.from('master_data').select('val').eq('key', 'PROFILE').single();
                if (data && data.val && data.val.logo) {
                    const forgotLogo = document.getElementById('forgotLogo');
                    if (forgotLogo) {
                        forgotLogo.src = data.val.logo;
                    }
                }
            } catch(e) {}
        }
        loadBranding();
        
        let verifiedUser = null;

        const normalizeWa = (w) => {
            let v = (w || '').replace(/\D/g, '');
            if(v.startsWith('0')) v = '62' + v.substring(1);
            else if(v.startsWith('8')) v = '62' + v;
            return v;
        };

        // STEP 1: Verifikasi Username + WA via Supabase
        document.getElementById('fwForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('inpUsername').value.trim();
            const waInput = document.getElementById('inpWaVerify').value.replace(/\D/g, '');
            const errMsg = document.getElementById('errMsg');
            const btn = e.target.querySelector('button');

            btn.disabled = true;
            btn.innerHTML = '⏱️ Sedang Memverifikasi...';
            errMsg.style.display = 'none';

            try {
                // Gunakan email atau full_name/metadata jika ada
                const targetEmail = username.includes('@') ? username : `${username}@qurban.com`;
                
                const { data: profiles, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .or(`email.eq.${username},email.eq.${targetEmail}`);

                if (error) throw error;

                const waNorm = normalizeWa(waInput);
                const found = profiles?.find(p => normalizeWa(p.phone || p.wa) === waNorm);

                if(!found) {
                    errMsg.style.display = 'block';
                    errMsg.textContent = '❌ Username atau Nomor WA tidak cocok di Database Cloud. Hubungi Admin jika Anda lupa data terdaftar.';
                    return;
                }

                // Admin tidak bisa reset via self-service
                if(found.role === 'admin') {
                    errMsg.style.display = 'block';
                    errMsg.textContent = '⚠️ Akun Admin tidak dapat direset di sini. Gunakan Dashboard Pengaturan Utama.';
                    return;
                }

                verifiedUser = found;
                
                document.getElementById('resetGreeting').textContent = `Identitas Terverifikasi: ${found.full_name || found.email}.`;
                document.getElementById('stepVerify').style.display = 'none';
                document.getElementById('stepReset').style.display = 'block';

            } catch (err) {
                errMsg.style.display = 'block';
                errMsg.textContent = '❌ Kesalahan Sistem: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ Verifikasi Identitas';
            }
        });

        // STEP 2: Kirim Permintaan Reset ke Admin
        document.getElementById('fwResetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('inpNewPwd').value;
            const confirmPwd = document.getElementById('inpConfirmPwd').value;
            const errMsg = document.getElementById('errMsgReset');
            const btn = e.target.querySelector('button');

            if (newPwd.length < 6) {
                errMsg.style.display = 'block';
                errMsg.textContent = '❌ Password minimal 6 karakter.';
                return;
            }

            if (newPwd !== confirmPwd) {
                errMsg.style.display = 'block';
                errMsg.textContent = '❌ Konfirmasi password tidak cocok.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '⏱️ Mengirim Permintaan...';
            
            try {
                // Catat Permintaan Reset ke database (Cloud Sync) agar Admin tahu
                await supabase.from('edit_requests').insert([{
                    trx_id: 'RESET-' + verifiedUser.id.substring(0,8),
                    new_data: { 
                        type: 'PASSWORD_RESET_REQUEST', 
                        email: verifiedUser.email, 
                        full_name: verifiedUser.full_name,
                        new_password: newPwd,
                        tgl: new Date().toISOString() 
                    },
                    requester_email: verifiedUser.email,
                    status: 'pending'
                }]);

                document.getElementById('stepReset').innerHTML = `
                    <div style="font-size:3rem; margin-bottom:1rem;">📨</div>
                    <h2>Permintaan Terkirim!</h2>
                    <p style="color:var(--text-main); line-height:1.6;">Halo <strong>${verifiedUser.full_name}</strong>, permintaan reset password Anda telah diteruskan ke **Daftar Permintaan Admin**.</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:2rem;">Admin akan memproses password baru Anda. Silakan hubungi Admin atau tunggu notifikasi via WhatsApp jika akun sudah aktif kembali.</p>
                    <a href="login.html" class="btn btn-primary btn-block" style="text-decoration:none;">🚀 Kembali ke Login</a>
                `;
            } catch (err) {
                errMsg.style.display = 'block';
                errMsg.textContent = '❌ Gagal mengirim permintaan: ' + err.message;
                btn.disabled = false;
                btn.innerHTML = '💾 Simpan Password Baru';
            }
        });
    </script>

</body>
</html>
